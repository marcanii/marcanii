name: Snake

on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:
  
  push:
    branches:
    - master
  
jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: generate snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: marcanii
        env:
          GITHUB_TOKEN: ${{ github.token }}
      
      - name: Copy SVG files
        run: |
          mkdir -p dist
          cp ${{ github.workspace }}/github-contribution-grid-snake*.svg dist/
      
      - name: Push branch output
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ github.token }}
