name: Snake

on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:
  
  push:
    branches:
      - master
  
jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      
      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '16' # Use Node.js 16
          
      - name: Install dependencies
        run: npm install
      
      - name: Generate snake
        run: npm run generate-snake
      
      - name: Configure Git
        run: |
          git config --global user.name "marcanii"
          git config --global user.email "israelmarcani10@gmail.com"
      
      - name: Commit and push changes
        run: |
          git add -A
          git commit -m "Update Snake visualization"
          git push
      
      - name: Publish to GitHub Pages
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
